x-airflow-common: &airflow-common
  build:
    context: ./airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_AIRFLOW_USER:-airflow}:${POSTGRES_AIRFLOW_PASSWORD:-airflow}@postgres-airflow:5432/${POSTGRES_AIRFLOW_DB:-airflow}
    AIRFLOW__WEBSERVER__SECRET_KEY: local-development-secret-key
    PYTHONPATH: /opt/airflow/src
    AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    WAREHOUSE_HOST: ${WAREHOUSE_HOST:-postgres-warehouse}
    WAREHOUSE_PORT: ${WAREHOUSE_PORT:-5432}
    WAREHOUSE_DB: ${WAREHOUSE_DB:-crypto_warehouse}
    WAREHOUSE_USER: ${WAREHOUSE_USER:-analytics}
    WAREHOUSE_PASSWORD: ${WAREHOUSE_PASSWORD:-analytics}
    COINGECKO_API_TIER: ${COINGECKO_API_TIER:-demo}
    COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
    COINGECKO_VS_CURRENCY: ${COINGECKO_VS_CURRENCY:-usd}
    COINGECKO_TOP_MARKETS: ${COINGECKO_TOP_MARKETS:-250}
    COINGECKO_HISTORY_TOP_COINS: ${COINGECKO_HISTORY_TOP_COINS:-20}
    COINGECKO_HISTORY_DAYS: ${COINGECKO_HISTORY_DAYS:-90}
    COINGECKO_REQUEST_SLEEP_SECONDS: ${COINGECKO_REQUEST_SLEEP_SECONDS:-1.5}
    DBT_PROFILES_DIR: /opt/airflow/dbt
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-warehouse:
      condition: service_healthy

services:
  postgres-airflow:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_AIRFLOW_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_AIRFLOW_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_AIRFLOW_DB:-airflow}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-warehouse:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${WAREHOUSE_USER:-analytics}
      POSTGRES_PASSWORD: ${WAREHOUSE_PASSWORD:-analytics}
      POSTGRES_DB: ${WAREHOUSE_DB:-crypto_warehouse}
    ports:
      - "${WAREHOUSE_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username $${AIRFLOW_ADMIN_USER:-admin}
      --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Local
      --lastname Admin
      --role Admin
      --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  airflow-cli:
    <<: *airflow-common
    profiles: ["tools"]
    command: bash

  dbt:
    <<: *airflow-common
    profiles: ["tools"]
    working_dir: /opt/airflow/dbt
    entrypoint: /bin/bash
    command: -lc "/home/airflow/dbt-venv/bin/dbt debug"

volumes:
  postgres_airflow_data:
  postgres_warehouse_data:
