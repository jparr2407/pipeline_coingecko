coingecko_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_HOST', 'postgres-warehouse') }}"
      user: "{{ env_var('WAREHOUSE_USER', 'analytics') }}"
      password: "{{ env_var('WAREHOUSE_PASSWORD', 'analytics') }}"
      port: "{{ env_var('WAREHOUSE_PORT', 5432) | int }}"
      dbname: "{{ env_var('WAREHOUSE_DB', 'crypto_warehouse') }}"
      schema: marts
      threads: 4
      connect_timeout: 10
